---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-tailscale
  namespace: litellm-stack
  #annotations:
  #  tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: litellm
      port:
        number: 4000
  tls:
    - hosts:
        - litellm
