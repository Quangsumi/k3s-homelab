apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Quangsumi/k3s-homelab.git
    targetRevision: main
    path: apps/litellm

  destination:
    server: https://kubernetes.default.svc
    namespace: litellm

  syncPolicy:
    syncOptions:
      - CreateNamespace=true