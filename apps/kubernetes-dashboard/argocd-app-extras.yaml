apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard-extras
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Quangsumi/k3s-homelab.git
    targetRevision: main
    path: apps/kubernetes-dashboard

  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard

  syncPolicy:
    syncOptions:
      - CreateNamespace=true