global:
  nodeSelector:
    kubernetes.io/hostname: rpivn
  logging:
    level: warn

configs:
  cm:
    timeout.reconciliation: 15m
    timeout.reconciliation.jitter: 5m
  params:
    server.insecure: "true"

dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  replicas: 0

controller:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi