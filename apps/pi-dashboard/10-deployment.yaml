apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-dashboard
  namespace: pi-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-dashboard
  template:
    metadata:
      labels:
        app: pi-dashboard
    spec:
      containers:
        - name: pi-dashboard
          image: quangsumi/pi-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi